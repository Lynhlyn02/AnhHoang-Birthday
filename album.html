<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Album - Happy Birthday Đỗ Anh Hoàng ❤️</title>

    <link rel="stylesheet" href="css/album.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Canvas nền -->
    <canvas id="starCanvas"></canvas>

    <!-- Tim -->
    <div id="heart-container"></div>

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- ================= HEADER ================= -->

    <header>

        <h1>

            Happy Birthday

        </h1>

        <h2>

            Đỗ Anh Hoàng ❤️

        </h2>
    </header>

    <!-- ================= SLIDESHOW ================= -->

    <section class="slideshow">

        <div class="slide active">
            <img src="images/anh1.jpg" alt="">
        </div>

        <div class="slide">
            <img src="images/anh2.jpg" alt="">
        </div>

        <div class="slide">
            <img src="images/anh3.jpg" alt="">
        </div>

        <div class="slide">
            <img src="images/anh4.jpg" alt="">
        </div>

        <div class="slide">
            <img src="images/anh5.jpg" alt="">
        </div>

        <div class="slide">
            <img src="images/anh6.jpg" alt="">
        </div>

        <div class="slide">
            <img src="images/anh7.jpg" alt="">
        </div>

        <div class="slide">
            <img src="images/anh8.jpg" alt="">
        </div>

        <div class="slide">
            <img src="images/anh9.jpg" alt="">
        </div>

        <div class="slide">
            <img src="images/anh10.jpg" alt="">
        </div>

        <div class="slide">
            <img src="images/anh11.jpg" alt="">
        </div>

    </section>

    <!-- ================= NEXT ================= -->

    <div class="next">

        <button id="nextPage">

            Tiếp tục ❤️

        </button>

    </div>

    <!-- Lightbox -->

    <div id="lightbox">

        <span id="close">

            ×

        </span>

        <img id="lightboxImg">

    </div>
    <!-- ================= MUSIC ================= -->

    <audio id="bgMusic">

        <source src="music/birthday.mp3" type="audio/mpeg">

    </audio>

    <!-- JS -->

    <script src="js/particles.js"></script>

    <script src="js/hearts.js"></script>

    <script src="js/album.js"></script>

    <script src="js/music.js"></script>

</body>

</html>
